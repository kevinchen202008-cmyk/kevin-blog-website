<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} - {{ .Site.Params.description }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">
  <meta name="keywords" content="{{ if .Params.tags }}{{ delimit .Params.tags ", " }}{{ else }}{{ delimit .Site.Params.keywords ", " }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}index.xml">
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "header.html" . }}

  <div class="site-content">
    <div class="container">
      <div class="content-wrapper">
        <main class="main-content" role="main">
          {{ block "main" . }}{{ end }}
        </main>
        {{ partial "sidebar.html" . }}
      </div>
    </div>
  </div>

  {{ partial "footer.html" . }}
</body>
</html>
