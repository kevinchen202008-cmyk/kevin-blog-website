<header class="site-header">
  <div class="container">
    <div class="site-branding">
      <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
      <p class="site-description">{{ .Site.Params.description }}</p>
    </div>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
