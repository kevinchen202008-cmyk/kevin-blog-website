name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write  # 允许推送到 GitHub Container Registry

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kevin-blog

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_IMAGE
          script: |
            set -e

            # 登录 GHCR（用本次 Actions 的临时 token 拉取镜像）
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            mkdir -p /opt/kevin-blog

            cat > /opt/kevin-blog/docker-compose.yml << COMPOSE
            services:
              blog:
                image: ${DEPLOY_IMAGE}
                ports:
                  - "80:80"
                restart: unless-stopped
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            COMPOSE

            docker compose -f /opt/kevin-blog/docker-compose.yml pull
            docker compose -f /opt/kevin-blog/docker-compose.yml up -d --remove-orphans
            docker image prune -f
