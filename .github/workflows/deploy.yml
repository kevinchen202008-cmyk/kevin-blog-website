name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kevin-blog

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/kevin-blog

            # 写入 docker-compose.yml（每次部署覆盖，确保与仓库一致）
            cat > /opt/kevin-blog/docker-compose.yml << 'COMPOSE'
            services:
              blog:
                image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
                ports:
                  - "80:80"
                restart: unless-stopped
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            COMPOSE

            docker compose -f /opt/kevin-blog/docker-compose.yml pull
            docker compose -f /opt/kevin-blog/docker-compose.yml up -d --remove-orphans

            # 清理旧镜像，保留磁盘空间
            docker image prune -f
